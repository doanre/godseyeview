<!DOCTYPE html>
<html>
<head>
    <title>WorldView Command Center</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body { margin: 0; background: #000; color: #0f0; font-family: monospace; }
        #cesiumContainer { width: 100%; height: 100vh; }
        #overlay { position: absolute; top: 20px; left: 20px; background: rgba(0,20,0,0.85); 
                   padding: 15px; border: 1px solid #0f0; z-index: 10; }
    </style>
</head>
<body>
    <div id="overlay">
        <h2 style="margin:0">WORLDVIEW OSINT</h2>
        <div id="status">INITIALIZING SIGNAL...</div>
    </div>
    <div id="cesiumContainer"></div>
    <script>
        const viewer = new Cesium.Viewer('cesiumContainer', { shouldAnimate: true });
        const ds = new Cesium.CzmlDataSource();
        viewer.dataSources.add(ds);

        // Auto-detect backend URL (Local vs Railway)
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${protocol}//${window.location.host}/ws`;
        
        const socket = new WebSocket(wsUrl);
        socket.onmessage = (e) => {
            ds.process(json.parse(e.data));
            document.getElementById('status').innerText = "LIVE FEED ACTIVE";
        };
    </script>
</body>
</html>
