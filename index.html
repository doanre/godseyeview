<!DOCTYPE html>
<html>
<head>
    <title>WORLDVIEW // GLOBAL OBSERVER</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.105/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #cesiumContainer { width: 100%; height: 100%; }
        #hud {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; border: 20px solid rgba(0, 255, 0, 0.05); box-sizing: border-box;
            z-index: 10; font-family: 'Courier New', monospace;
        }
        .panel {
            position: absolute; background: rgba(0, 10, 0, 0.85);
            border: 1px solid #0f0; color: #0f0; padding: 15px; pointer-events: auto;
        }
        #top-left { top: 30px; left: 30px; width: 250px; }
        .glitch { animation: glitch 2s infinite; }
        @keyframes glitch { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>
    <div id="hud">
        <div id="top-left" class="panel">
            <div style="font-size: 1.2em; border-bottom: 1px solid #0f0; margin-bottom: 5px;">SYSTEM STATUS</div>
            <div class="glitch">LINK: <span id="status">ESTABLISHING...</span></div>
            <div style="margin-top: 10px; font-size: 0.8em;">
                <span style="color: cyan;">●</span> SATELLITES ACTIVE<br>
                <span style="color: lime;">●</span> AIRCRAFT BROADCASTS<br>
                <span style="color: yellow;">●</span> MARITIME SIGNALS (MOCKED)
            </div>
        </div>
    </div>
    <div id="cesiumContainer"></div>
    <script>
        // Use a free ArcGIS basemap so the Earth renders without a Cesium Ion token
        const imageryProvider = new Cesium.ArcGisMapServerImageryProvider({
            url: 'https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer'
        });

        const viewer = new Cesium.Viewer('cesiumContainer', {
            imageryProvider: imageryProvider,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            sceneModePicker: true,
            navigationHelpButton: false,
            shouldAnimate: true,
            // Suppress the Ion token warning banner
            creditContainer: document.createElement('div')
        });

        // Position the camera to see the full globe on load
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(0.0, 20.0, 25000000.0)
        });

        const ds = new Cesium.CzmlDataSource();
        viewer.dataSources.add(ds);

        // Use wss:// when the page is served over HTTPS, ws:// otherwise
        const wsProtocol = window.location.protocol === 'https:' ? 'wss' : 'ws';
        const socket = new WebSocket(`${wsProtocol}://${window.location.host}/ws`);
        socket.onmessage = (event) => {
            ds.process(JSON.parse(event.data));
            document.getElementById('status').innerText = "SYNCHRONIZED";
        };
        socket.onerror = () => {
            document.getElementById('status').innerText = "CONNECTION ERROR";
        };
        socket.onclose = () => {
            document.getElementById('status').innerText = "DISCONNECTED";
        };
    </script>
</body>
</html>
